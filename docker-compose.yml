services:
  api:
    build: .
    ports:
      - "8080:8080"
    environment:
      ADDR: ":8080"
      DATABASE_URL: "postgres://tasks_user:tasks_pass@postgres:5432/tasks_db?sslmode=disable"
      REDIS_ADDR: "redis:6379"
      READ_TIMEOUT: "5s"
      WRITE_TIMEOUT: "10s"
      IDLE_TIMEOUT: "120s"
    depends_on:
      postgres:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  auth:
    build: .
    command: ["./auth"]
    ports:
      - "8081:8081"
    environment:
      AUTH_ADDR: ":8081"
      DATABASE_URL: "postgres://tasks_user:tasks_pass@postgres:5432/tasks_db?sslmode=disable"
      REDIS_ADDR: "redis:6379"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    restart: unless-stopped

  migrate:
    build: .
    command: ["./migrate"]
    environment:
      DATABASE_URL: "postgres://tasks_user:tasks_pass@postgres:5432/tasks_db?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: tasks_user
      POSTGRES_PASSWORD: tasks_pass
      POSTGRES_DB: tasks_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tasks_user -d tasks_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
